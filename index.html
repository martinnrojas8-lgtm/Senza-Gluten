<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senza Gluten - Gestión</title>
<style>
/* --- ESTILOS DE MARCA Y COLORES (Basados en image_8.png) --- */
body {
    font-family: 'Times New Roman', Times, serif;
    padding: 10px;
    background-color: #f7f6f1; /* Crema suave */
    color: #333;
}

/* --- DISEÑO DEL LOGO Y TÍTULO --- */
.header-container {
    display: flex;
    flex-direction: column; /* Centrado vertical */
    align-items: center; /* Centrado horizontal */
    justify-content: center;
    margin-bottom: 25px;
    text-align: center;
}

.logo {
    max-width: 150px; /* Tamaño del logo */
    height: auto;
    margin-bottom: 10px;
}

.main-title {
    font-size: 26px;
    font-weight: bold;
    color: #333;
    margin: 0;
}

/* --- ESTILOS DE NAVEGACIÓN (En una sola fila) --- */
nav {
    display: flex;
    justify-content: space-around; /* Distribución uniforme */
    border-bottom: 2px solid #ddd;
    margin-bottom: 20px;
    background-color: #fdfdfc;
    padding: 10px 0;
    flex-wrap: wrap; /* Para que no se corte en móviles */
}

.tab-btn {
    padding: 10px 15px;
    cursor: pointer;
    border: none;
    background: none;
    color: #555;
    font-weight: bold;
    font-size: 15px;
    transition: color 0.3s;
    border-bottom: 3px solid transparent;
    font-family: 'Times New Roman', Times, serif;
}

.tab-btn:hover {
    color: #8cba51;
}

.tab-btn.active {
    color: #79a140; /* Verde oliva activo */
    border-bottom: 3px solid #79a140;
}

/* --- ESTILOS DE CONTENIDO --- */
.tab-content {
    display: none;
    padding: 20px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.show {
    display: block;
}

input, select {
    display: block;
    width: 100%;
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box; /* Importante para el tamaño de inputs */
}

button {
    width: 100%;
    padding: 12px;
    background-color: #79a140; /* Verde oliva logo */
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    margin-top: 5px;
    font-family: 'Times New Roman', Times, serif;
}

button:hover {
    background-color: #6b8d38;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background-color: white;
    font-size: 14px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: left;
}

th {
    background-color: #f9f9f9;
}

.backup-section {
    margin-top: 40px;
    border-top: 2px solid #ddd;
    padding-top: 15px;
    text-align: center;
}

/* Estilo para botones de acción en tabla */
.btn-action { width: auto; padding: 5px; font-size: 12px; margin: 2px; }

/* Panel de Pedidos */
#panelPedido { 
    background: #fdfdfc; 
    border: 2px solid #79a140; 
    padding: 20px; 
    margin-top: 20px; 
    display: none; 
}
</style>
</head>
<body>

<div class="header-container">
    <img src="IMG-20260214-WA0059.jpg" alt="Logo Senza Gluten" class="logo">
    <h1 class="main-title">Sistema de Gestión</h1>
</div>

<nav>
    <button class="tab-btn active" onclick="verTab('prov')">Proveedores</button>
    <button class="tab-btn" onclick="verTab('prod')">Productos</button>
    <button class="tab-btn" onclick="verTab('venta')">Ventas</button>
    <button class="tab-btn" onclick="verTab('caja')">Caja</button>
</nav>

<div id="prov" class="tab-content show">
    <h3>Gestión de Proveedores</h3>
    <input type="text" id="nombreProv" placeholder="Nombre Proveedor">
    <input type="text" id="telProv" placeholder="Teléfono">
    <input type="text" id="dirProv" placeholder="Dirección">
    <input type="text" id="prodProv" placeholder="Productos (separados por coma)">
    <button onclick="guardarProv()">Guardar Proveedor</button>
    <table>
        <thead><tr><th>Nombre</th><th>Tel</th><th>Dir</th><th>Productos</th><th>Acciones</th></tr></thead>
        <tbody id="cuerpoTablaProv"></tbody>
    </table>

    <div id="panelPedido">
        <h3>Pedido a: <span id="nombreProvPedido"></span></h3>
        <div id="listaProductosPedido"></div>
        <button onclick="generarExcelPedido()" style="background:#28a745">📥 Descargar Pedido (Excel/CSV)</button>
        <button onclick="document.getElementById('panelPedido').style.display='none'" style="background:#666">Cerrar</button>
    </div>
</div>

<div id="prod" class="tab-content">
    <h3>Carga Productos</h3>
    <input type="text" id="nombreProd" placeholder="Nombre Producto">
    <input type="number" id="precioProd" placeholder="Precio">
    <input type="number" id="stockProd" placeholder="Stock Inicial">
    <button onclick="guardarProd()">Guardar Producto</button>
    <table><thead><tr><th>Prod</th><th>Stock</th><th>Precio</th></tr></thead><tbody id="cuerpoTablaProd"></tbody></table>
</div>

<div id="venta" class="tab-content">
    <h3>Registrar Venta</h3>
    <select id="selectProd"></select>
    <input type="number" id="cantVenta" placeholder="Cantidad">
    <button onclick="realizarVenta()">Vender</button>
</div>

<div id="caja" class="tab-content">
    <h3>Cierre de Caja Diario</h3>
    <div id="resumenCaja"></div>
</div>

<div class="backup-section">
    <h3>Respaldo de Datos (Seguridad)</h3>
    <button style="background-color: #8fa1ac;" onclick="exportarDatos()">📥 Descargar Backup (Guardar)</button>
    <p>Subir Backup (Restaurar):</p>
    <input type="file" id="inputArchivo" onchange="importarDatos(event)">
</div>

<script>
// --- NAVEGACIÓN ---
function verTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('show'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('show');
    event.target.classList.add('active');
    if(id === 'venta') actualizarSelect();
    if(id === 'caja') calcularCaja();
}

// --- PROVEEDORES ---
function guardarProv() {
    let prov = {
        nombre: document.getElementById('nombreProv').value,
        tel: document.getElementById('telProv').value,
        dir: document.getElementById('dirProv').value,
        prods: document.getElementById('prodProv').value
    };
    if(!prov.nombre) return alert("Nombre obligatorio");
    let provs = JSON.parse(localStorage.getItem('provs') || '[]');
    provs.push(prov);
    localStorage.setItem('provs', JSON.stringify(provs));
    document.getElementById('nombreProv').value = '';
    document.getElementById('telProv').value = '';
    document.getElementById('dirProv').value = '';
    document.getElementById('prodProv').value = '';
    mostrarProvs();
}

function mostrarProvs() {
    let provs = JSON.parse(localStorage.getItem('provs') || '[]');
    let tbody = document.getElementById('cuerpoTablaProv');
    tbody.innerHTML = provs.map((p, i) => `<tr>
        <td>${p.nombre}</td><td>${p.tel}</td><td>${p.dir}</td><td>${p.prods}</td>
        <td>
            <button class="btn-action" onclick="editarProv(${i})">Edit</button>
            <button class="btn-action" onclick="abrirPanelPedido(${i})">Pedido</button>
            <button class="btn-action" onclick="borrarProv(${i})" style="background:#cc0000">X</button>
        </td>
    </tr>`).join('');
}

function editarProv(i) {
    let provs = JSON.parse(localStorage.getItem('provs'));
    let p = provs[i];
    p.nombre = prompt("Nombre:", p.nombre) || p.nombre;
    p.tel = prompt("Teléfono:", p.tel) || p.tel;
    p.dir = prompt("Dirección:", p.dir) || p.dir;
    p.prods = prompt("Productos (separados por coma):", p.prods) || p.prods;
    localStorage.setItem('provs', JSON.stringify(provs));
    mostrarProvs();
}

// --- PEDIDOS NUEVA FUNCIÓN ---
let provActualIndex = -1;
function abrirPanelPedido(i) {
    provActualIndex = i;
    let provs = JSON.parse(localStorage.getItem('provs'));
    let p = provs[i];
    document.getElementById('nombreProvPedido').innerText = p.nombre;
    
    // Obtener productos
    let lista = p.prods.split(',').map(s => s.trim()).filter(s => s !== "");
    
    let html = '<table><thead><tr><th>Producto</th><th>Cantidad</th></tr></thead><tbody>';
    lista.forEach((item, idx) => {
        html += `<tr><td>${item}</td><td><input type="number" class="input-cant" data-prod="${item}" value="0" style="width:60px; padding:5px;"></td></tr>`;
    });
    html += '</tbody></table>';
    
    document.getElementById('listaProductosPedido').innerHTML = html;
    document.getElementById('panelPedido').style.display = 'block';
}

function generarExcelPedido() {
    let provs = JSON.parse(localStorage.getItem('provs'));
    let nombreProv = provs[provActualIndex].nombre;
    let rows = [["Producto", "Cantidad"]];
    
    document.querySelectorAll('.input-cant').forEach(input => {
        if(input.value > 0) rows.push([input.dataset.prod, input.value]);
    });
    
    if(rows.length === 1) return alert("El pedido está vacío.");

    let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
    let encodedUri = encodeURI(csvContent);
    let link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Pedido_${nombreProv}_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`);
    document.body.appendChild(link);
    link.click();
    link.remove();
}

function borrarProv(i) {
    if(confirm("¿Borrar proveedor?")) {
        let provs = JSON.parse(localStorage.getItem('provs'));
        provs.splice(i, 1);
        localStorage.setItem('provs', JSON.stringify(provs));
        mostrarProvs();
    }
}

// --- PRODUCTOS ---
function guardarProd() {
    let nombre = document.getElementById('nombreProd').value;
    let precio = parseFloat(document.getElementById('precioProd').value);
    let stock = parseInt(document.getElementById('stockProd').value);
    if(!nombre || isNaN(precio) || isNaN(stock)) return alert("Completá todos los campos");

    let prods = JSON.parse(localStorage.getItem('prods') || '[]');
    prods.push({nombre, precio, stock});
    localStorage.setItem('prods', JSON.stringify(prods));
    
    document.getElementById('nombreProd').value = '';
    document.getElementById('precioProd').value = '';
    document.getElementById('stockProd').value = '';
    mostrarProds();
}
function mostrarProds() {
    let prods = JSON.parse(localStorage.getItem('prods') || '[]');
    let tbody = document.getElementById('cuerpoTablaProd');
    tbody.innerHTML = prods.map(p => `<tr><td>${p.nombre}</td><td>${p.stock}</td><td>$${p.precio}</td></tr>`).join('');
}

// --- VENTAS ---
function actualizarSelect() {
    let prods = JSON.parse(localStorage.getItem('prods') || '[]');
    let sel = document.getElementById('selectProd');
    sel.innerHTML = '<option value="">Seleccioná un producto...</option>' + 
                   prods.map((p, i) => `<option value="${i}">${p.nombre} (Stock: ${p.stock})</option>`).join('');
}

function realizarVenta() {
    let index = document.getElementById('selectProd').value;
    let cant = parseInt(document.getElementById('cantVenta').value);
    let prods = JSON.parse(localStorage.getItem('prods'));
    
    if(index === "" || isNaN(cant) || cant <= 0) return alert("Seleccioná producto y cantidad");
    if(prods[index].stock >= cant) {
        prods[index].stock -= cant;
        let venta = { 
            prod: prods[index].nombre, 
            total: cant * prods[index].precio, 
            fecha: new Date().toLocaleDateString() 
        };
        let ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
        ventas.push(venta);
        localStorage.setItem('prods', JSON.stringify(prods));
        localStorage.setItem('ventas', JSON.stringify(ventas));
        document.getElementById('cantVenta').value = '';
        alert("Venta registrada");
        actualizarSelect();
    } else { alert("¡Stock insuficiente!"); }
}

// --- CAJA ---
function calcularCaja() {
    let ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
    let hoy = new Date().toLocaleDateString();
    let ventasHoy = ventas.filter(v => v.fecha === hoy);
    let total = ventasHoy.reduce((acc, v) => acc + v.total, 0);
    
    let resumenHtml = `<h4>Ventas de hoy (${hoy}):</h4>`;
    resumenHtml += `<ul>` + ventasHoy.map(v => `<li>${v.prod}: $${v.total}</li>`).join('') + `</ul>`;
    resumenHtml += `<h3>Total recaudado: $${total}</h3>`;
    
    document.getElementById('resumenCaja').innerHTML = resumenHtml;
}

// --- BACKUP ---
function exportarDatos() {
    let datos = {
        provs: localStorage.getItem('provs'),
        prods: localStorage.getItem('prods'),
        ventas: localStorage.getItem('ventas')
    };
    let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(datos));
    let a = document.createElement('a');
    a.setAttribute("href", dataStr);
    a.setAttribute("download", "backup_senzagluten.json");
    a.click();
}

function importarDatos(event) {
    let reader = new FileReader();
    reader.onload = function(e) {
        let datos = JSON.parse(e.target.result);
        localStorage.setItem('provs', datos.provs);
        localStorage.setItem('prods', datos.prods);
        localStorage.setItem('ventas', datos.ventas);
        alert("Datos restaurados. Se recargará la página.");
        location.reload();
    };
    reader.readAsText(event.target.files[0]);
}

// --- CARGA INICIAL ---
mostrarProvs();
mostrarProds();
</script>
</body>
</html>
