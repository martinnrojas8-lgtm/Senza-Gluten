<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senza Gluten - Gestión</title>
<style>
/* --- ESTILOS DE MARCA Y COLORES (Basados en image_8.png) --- */
body {
    font-family: 'Times New Roman', Times, serif; /* Fuente cursiva elegante */
    padding: 10px;
    background-color: #f7f6f1; /* Crema muy suave de fondo */
    color: #333;
}

/* --- ESTILOS DE NAVEGACIÓN (En una sola fila) --- */
nav {
    display: flex;
    justify-content: flex-start;
    border-bottom: 2px solid #ddd;
    margin-bottom: 20px;
    background-color: #fdfdfc; /* Fondo suave para menú */
    padding: 5px 0;
}

.tab-btn {
    padding: 12px 18px;
    cursor: pointer;
    border: none;
    background: none; /* Sin fondo por defecto */
    color: #555; /* Color de texto suave */
    font-weight: bold;
    font-size: 16px;
    transition: color 0.3s;
    border-bottom: 3px solid transparent; /* Línea inferior invisible */
    font-family: 'Times New Roman', Times, serif;
}

.tab-btn:hover {
    color: #8cba51; /* Verde más vivo al pasar el mouse */
}

.tab-btn.active {
    color: #79a140; /* Verde oliva de las hojas para la pestaña activa */
    border-bottom: 3px solid #79a140; /* Línea verde oliva */
}

/* --- ESTILOS DE CONTENIDO Y TABLAS --- */
.tab-content {
    display: none;
    padding: 20px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.show {
    display: block;
}

input, select {
    display: block;
    width: 100%;
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #79a140; /* Verde oliva del logo */
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    margin-top: 5px;
    font-family: 'Times New Roman', Times, serif;
}

button:hover {
    background-color: #6b8d38; /* Verde ligeramente más oscuro */
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background-color: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: left;
}

th {
    background-color: #f9f9f9;
}

.backup-section {
    margin-top: 40px;
    border-top: 2px solid #ddd;
    padding-top: 15px;
}

/* --- DISEÑO DEL LOGO Y TÍTULO --- */
.logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
}

.logo {
    max-width: 80px; /* Ajusta el tamaño según necesites */
    margin-right: 15px;
}

.main-title {
    font-size: 28px;
    font-weight: bold;
    color: #333;
}
</style>
</head>
<body>

<div class="logo-container">
    <img src="imagen_del_logo_aqui.png" alt="" class="logo">
    <h2 class="main-title">📦 Senza Gluten - Gestión</h2>
</div>

<nav>
    <button class="tab-btn active" onclick="verTab('prov')">Proveedores</button>
    <button class="tab-btn" onclick="verTab('prod')">Productos</button>
    <button class="tab-btn" onclick="verTab('venta')">Ventas</button>
    <button class="tab-btn" onclick="verTab('caja')">Caja</button>
</nav>

<div id="prov" class="tab-content show">
    <h3>Alta Proveedores</h3>
    <input type="text" id="nombreProv" placeholder="Nombre Proveedor">
    <button onclick="guardarProv()">Guardar</button>
    <ul id="listaProv"></ul>
</div>

<div id="prod" class="tab-content">
    <h3>Carga Productos</h3>
    <input type="text" id="nombreProd" placeholder="Nombre Producto">
    <input type="number" id="precioProd" placeholder="Precio">
    <input type="number" id="stockProd" placeholder="Stock Inicial">
    <button onclick="guardarProd()">Guardar Producto</button>
    <table id="tablaProd"><thead><tr><th>Prod</th><th>Stock</th><th>Precio</th></tr></thead><tbody></tbody></table>
</div>

<div id="venta" class="tab-content">
    <h3>Registrar Venta</h3>
    <select id="selectProd"></select>
    <input type="number" id="cantVenta" placeholder="Cantidad">
    <button onclick="realizarVenta()">Vender</button>
</div>

<div id="caja" class="tab-content">
    <h3>Cierre de Caja Diario</h3>
    <div id="resumenCaja"></div>
</div>

<div class="backup-section">
    <h3>Respaldo de Datos (Seguridad)</h3>
    <button style="background-color: #8fa1ac;" onclick="exportarDatos()">📥 Descargar Backup (Guardar)</button>
    <p>Subir Backup (Restaurar):</p>
    <input type="file" id="inputArchivo" onchange="importarDatos(event)">
</div>

<script>
// --- NAVEGACIÓN ---
function verTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('show'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('show');
    event.target.classList.add('active');
    if(id === 'venta') actualizarSelect();
    if(id === 'caja') calcularCaja();
}

// --- FUNCIONES BACKUP ---
function exportarDatos() {
    let datos = {
        provs: localStorage.getItem('provs'),
        prods: localStorage.getItem('prods'),
        ventas: localStorage.getItem('ventas')
    };
    let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(datos));
    let downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "backup_gestion_senzagluten.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

function importarDatos(event) {
    let reader = new FileReader();
    reader.onload = function(e) {
        let datos = JSON.parse(e.target.result);
        localStorage.setItem('provs', datos.provs);
        localStorage.setItem('prods', datos.prods);
        localStorage.setItem('ventas', datos.ventas);
        alert("Datos restaurados correctamente");
        location.reload();
    };
    reader.readAsText(event.target.files[0]);
}

// --- LÓGICA DE NEGOCIO ---
function guardarProv() {
    let provs = JSON.parse(localStorage.getItem('provs') || '[]');
    provs.push(document.getElementById('nombreProv').value);
    localStorage.setItem('provs', JSON.stringify(provs));
    location.reload();
}

function guardarProd() {
    let prods = JSON.parse(localStorage.getItem('prods') || '[]');
    prods.push({
        nombre: document.getElementById('nombreProd').value,
        precio: parseFloat(document.getElementById('precioProd').value),
        stock: parseInt(document.getElementById('stockProd').value)
    });
    localStorage.setItem('prods', JSON.stringify(prods));
    location.reload();
}

function actualizarSelect() {
    let prods = JSON.parse(localStorage.getItem('prods') || '[]');
    let sel = document.getElementById('selectProd');
    sel.innerHTML = prods.map((p, i) => `<option value="${i}">${p.nombre} (Stock: ${p.stock})</option>`).join('');
}

function realizarVenta() {
    let index = document.getElementById('selectProd').value;
    let cant = parseInt(document.getElementById('cantVenta').value);
    let prods = JSON.parse(localStorage.getItem('prods'));
    if(prods[index].stock >= cant) {
        prods[index].stock -= cant;
        let venta = { 
            prod: prods[index].nombre, 
            total: cant * prods[index].precio, 
            fecha: new Date().toLocaleDateString() 
        };
        let ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
        ventas.push(venta);
        localStorage.setItem('prods', JSON.stringify(prods));
        localStorage.setItem('ventas', JSON.stringify(ventas));
        alert("Venta registrada");
        location.reload();
    } else { alert("¡Stock insuficiente!"); }
}

function calcularCaja() {
    let ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
    let hoy = new Date().toLocaleDateString();
    let total = ventas.filter(v => v.fecha === hoy).reduce((acc, v) => acc + v.total, 0);
    document.getElementById('resumenCaja').innerHTML = `<h4>Total ventas hoy: $${total}</h4>`;
}

function init() {
    let prods = JSON.parse(localStorage.getItem('prods') || '[]');
    let tbody = document.querySelector('#tablaProd tbody');
    tbody.innerHTML = prods.map(p => `<tr><td>${p.nombre}</td><td>${p.stock}</td><td>$${p.precio}</td></tr>`).join('');
}
init();
</script>
</body>
</html>
